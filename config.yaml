# All the settings for the application
application:
  appName: "PacMan"
  version: "0.1 Alpha"
  fontSize: 14
  minSize: [800, 250]
  geometry: [100, 100, 800, 600]
  mainLayout:
    contentsMargin: [0, 0, 0, 0]
    spacing: 0
  sideBar:
    minWidth: 100
    maxWidth: 200
    contentMargins: [10, 10, 10, 10]
    spacing: 15
    navListContentMargin: [0, 0, 0, 0]
    navListSpacing: 3
  library:
    locationLayout:
      contentMargin: [0, 0, 0, 0]
    labelLocation:
      contentMargin: [0, 0, 0, 0]
  installer:
    contentMargin: [0, 0, 0, 0]

# Some Control Parameters
controls:
  library:
    uninstallManagerTimout: 10000

# Relative paths
paths:
  fonts:
    main: fonts/Figtree-Light.ttf
  images:
    icon:
      appLogo: icons/appLogo.png
      delete: icons/delete.png
  executablePaths:
    library:
      darwin: ./go_app
      win32: ./go_app.exe
      win64: ./go_app.exe
      linux: ./go_app

# Object Names for styling mainly
objects:
  mainWindow: PacMan"

# All the API's which are going to be used in this application
api:
  pypi:
    libraryDetails: https://pypi.org/pypi/{package}/json
    packageList: https://pypi.org/simple/

# Colors definition
colors:
  primary: "#007bff"
  secondary: "#6c757d"
  success: "#28a745"
  danger: "#dc3545"
  warning: "#ffc107"
  info: "#17a2b8"
  light: "#f8f9fa"
  dark: "#343a40"

  # Application-specific colors
  background:
    main: "#2D2D2D"
    sidebar: "#272321"
    input: "#242424"
    hover: "#444444"
    pressed: "#555555"
    selected: "#333333"
  text:
    normal: "#EEEEEE"
    muted: "#AAAAAA"
    bright: "#FFFFFF"
  border:
    light: "#555555"
    dark: "#3C3C3C"
  button:
    primary: "#007ACC"
    primaryHover: "#005C99"
    primaryPressed: "#004C80"

# Stylesheet with multiple sections using color variables
stylesheet:
  main: |
    QMainWindow, QWidget {
    }
    #sideBar {
        background-color: {{ colors.background.sidebar }};
    }
    #contentStack {
        background-color: {{ colors.background.main }};
    }
    /* Navigation List */
    #navList {
        border: none;
        background-color: {{ colors.background.sidebar }};
    }
    #navList::item {
        padding: 10px;
        color: {{ colors.text.muted }};
        border-radius: 5px;
    }
    #navList::item:hover {
        background-color: {{ colors.background.hover }};
    }
    #navList::item:selected {
        background-color: {{ colors.background.selected }};
        color: {{ colors.text.bright }};
        font-weight: bold;
    }
    #labelLocation {
      background-color: {{ colors.border.dark }};
      color: {{ colors.text.muted }};
      font-style: italic;
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #labelLocation:hover {
      background-color: {{ colors.background.hover }};
    }
    #labelLocation:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #labelLocationFinal {
      color: {{ colors.text.muted }};
      font-size: 13px;
    }
    #searchBarInLibraryListWidget {
      background-color: {{ colors.background.input }};
      color: {{ colors.text.normal }};
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #searchBarInLibraryListWidget:hover {
      background-color: {{ colors.background.hover }};
    }
    #searchBarInLibraryListWidget:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #searchBarInstaller {
      background-color: {{ colors.background.input }};
      color: {{ colors.text.normal }};
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #searchBarInstaller:hover {
      background-color: {{ colors.background.hover }};
    }
    #searchBarInstaller:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #libraryListViewInstaller{
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item {
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item:selected {
      background-color: {{ colors.background.selected }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item:hover {
      background-color: {{ colors.background.hover }};
      border-radius: 5px;
    }
    #libraryList {
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryList::item {
      background-color: {{ colors.background.main }};
      border-radius: 5px;

    }
    #libraryList::item:selected {
      background-color: {{ colors.background.selected }};
      border-radius: 5px;
    }
    #libraryList::item:hover {
      background-color: {{ colors.background.hover }};
      border-radius: 5px;
    }
    #tagLibraryPanel {
      font-style: italic;
      color: {{ colors.text.muted }};
      border-right: 1px solid {{ colors.text.bright }};
    }
    #versionLibraryPanel {
      font-style: italic;
      color: {{ colors.text.muted }};
    }
    #deleteButtonFromLibraryListWidget {
      color: {{ colors.text.muted }};
      border-radius: 5px;
      border: none;
      padding: 5px;
      font-size: 12px;
      }
    #deleteButtonFromLibraryListWidget:hover {
      background-color: {{ colors.background.hover }};
    }
    #deleteButtonFromLibraryListWidget:pressed {
      background-color: {{ colors.background.pressed }};
    }

    QMessageBox {
      background-color: {{ colors.background.selected }};
      border: 1px solid {{ colors.border.light }};
    }

    QMessageBox QLabel {
      color: {{ colors.text.bright }};
      font-size: 16px;
    }

    QMessageBox QPushButton {
      background-color: {{ colors.button.primary }};
      color: white;
      border-radius: 5px;
      padding: 8px;
      min-width: 80px;
      font-size: 14px;
    }

    QMessageBox QPushButton:hover {
      background-color: {{ colors.button.primaryHover }};
    }

    QMessageBox QPushButton:pressed {
      background-color: {{ colors.button.primaryPressed }};
    }

  libraryListToolTip: |
    QToolTip {
      background-color: {{ colors.border.dark }};
      color: {{ colors.text.muted }};
      border-radius: 5px;
      padding: 5px;
      font-size: 14px;
    }
