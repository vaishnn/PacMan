# All the settings for the application
application:
  name: "PacMan"
  version: "0.1 Alpha"
  fontSize: 14
  minSize: [800, 250]
  geometry: [100, 100, 800, 600]
  mainLayout:
    contentsMargin: [0, 0, 0, 0]
    spacing: 0
  sideBar:
    minWidth: 100
    maxWidth: 200
    contentMargins: [10, 10, 10, 10]
    spacing: 15
    navListContentMargin: [0, 0, 0, 0]
    navListSpacing: 3
  library:
    locationLayout:
      contentMargin: [0, 0, 0, 0]
    labelLocation:
      contentMargin: [0, 0, 0, 0]
  installer:
    contentMargin: [0, 0, 0, 0]
    roundedCornersRadius: 5

# Some Control Parameters
controls:
  library:
    uninstallManagerTimout: 10000
  installer:
    detailsTimeout: 1000

# Relative paths
paths:
  searchPaths:
    darwin: # These are the most probable paths, It is possible to build a text field to accept some more places
      - /Library/Frameworks/Python.framework/Versions
      - /usr/local/bin
      - /usr/bin
      - /opt/homebrew/bin
    win32: Needs to be implemented
    win64: Needs to be implemented
    linux: Needs to be implemented
  fonts:
    main: fonts/Figtree-Light.ttf
  images:
    appLogo: icons/appLogo.png
    uninstall: icons/uninstall.svg
    install: icons/install.svg
    installing: icons/installing.png
    installed: icons/installed.png
  executablePaths:
    library:
      darwin: ./go_app
      win32: ./go_app.exe
      win64: ./go_app.exe
      linux: ./go_app

# Object Names for styling mainly
objects:
  mainWindow: PacMan"

# All the API's which are going to be used in this application
api:
  pypi:
    libraryDetails: https://pypi.org/pypi/{}/json
    packageList: https://pypi.org/simple/

# Colors definition
colors:
  primary: "#007bff"
  secondary: "#6c757d"
  success: "#28a745"
  danger: "#dc3545"
  warning: "#ffc107"
  info: "#17a2b8"
  light: "#f8f9fa"
  dark: "#343a40"

  # Application-specific colors
  background:
    main: "#2D2D2D"
    sidebar: "#272321"
    input: "#242424"
    hover: "#444444"
    pressed: "#555555"
    selected: "#333333"
  text:
    normal: "#EEEEEE"
    muted: "#AAAAAA"
    bright: "#FFFFFF"
  border:
    light: "#555555"
    dark: "#3C3C3C"
  button:
    primary: "#007ACC"
    primaryHover: "#005C99"
    primaryPressed: "#004C80"
    install: "#e5e5e5"

# Stylesheet with multiple sections using color variables
stylesheet:
  main: |
    #mainWindowContainer {
      background-color: #2E2E2E;
      border: 1px solid #555;
      border-radius: 10px;
    }
    QMainWindow, QWidget {
    }
    #library{
      background-color: {{ colors.background.sidebar }};
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    #dependencyTree{
      background-color: {{ colors.background.sidebar }};
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    #setting{
      background-color: {{ colors.background.sidebar }};
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    #about{
      background-color: {{ colors.background.sidebar }};
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    #analysis {
      background-color: {{ colors.background.sidebar }};
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    #sideBar {
        background-color: {{ colors.background.sidebar }};
        border-top-left-radius: 10px;
        border-bottom-left-radius: 10px;
    }
    #contentStack {
        background-color: {{ colors.background.main }};
        border-top-right-radius: 10px;
        border-bottom-right-radius: 10px;
    }
    #controlBar {
      background-color: #383838;
      border-top-left-radius: 10px;
    }

    /* Hover effects for traffic light buttons */
    #closeButton {
      background-color: #FF605C;
      border-radius: 6px; /* half of width/height */
      border: none;
    }
    #minimizeButton {
      background-color: #FFBD44;
      border-radius: 6px; /* half of width/height */
      border: none;
    }
    #maximizeButton {
      background-color: #00CA4E;
      border-radius: 6px; /* half of width/height */
      border: none;
    }
    /* Navigation List */
    #navList {
      border: none;
      background-color: {{ colors.background.sidebar }};
    }
    #navList::item {
      padding: 10px;
      color: {{ colors.text.muted }};
      border-radius: 5px;
    }
    #navList::item:hover {
      background-color: {{ colors.background.hover }};
    }
    #navList::item:selected {
      background-color: {{ colors.background.selected }};
      color: {{ colors.text.bright }};
      font-weight: bold;
    }
    #labelLocation {
      background-color: {{ colors.border.dark }};
      color: {{ colors.text.muted }};
      font-style: italic;
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #labelLocation:hover {
      background-color: {{ colors.background.hover }};
    }
    #labelLocation:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #labelLocationFinal {
      color: {{ colors.text.muted }};
      font-size: 13px;
    }
    #searchBarInLibraryListWidget {
      background-color: {{ colors.background.input }};
      color: {{ colors.text.normal }};
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #searchBarInLibraryListWidget:hover {
      background-color: {{ colors.background.hover }};
    }
    #searchBarInLibraryListWidget:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #searchBarInstaller {
      background-color: {{ colors.background.input }};
      color: {{ colors.text.normal }};
      border: 0px solid {{ colors.border.light }};
      border-radius: 5px;
      padding-left: 10px;
      padding-right: 10px;
      font-size: 13px;
    }
    #searchBarInstaller:hover {
      background-color: {{ colors.background.hover }};
    }
    #searchBarInstaller:pressed {
      background-color: {{ colors.background.pressed }};
    }
    #libraryListViewInstaller{
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item {
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item:selected {
      background-color: {{ colors.background.selected }};
      border-radius: 5px;
    }
    #libraryListViewInstaller::item:hover {
      background-color: {{ colors.background.hover }};
      border-radius: 5px;
    }
    #libraryList {
      background-color: {{ colors.background.main }};
      border-radius: 5px;
    }
    #libraryList::item {
      background-color: {{ colors.background.main }};
      border-radius: 5px;

    }
    #libraryList::item:hover {
      background-color: {{ colors.background.hover }};
      border-radius: 5px;
    }
    #tagLibraryPanel {
      font-style: italic;
      color: {{ colors.text.muted }};
      border-right: 1px solid {{ colors.text.bright }};
    }
    #versionLibraryPanel {
      font-style: italic;
      color: {{ colors.text.muted }};
    }
    #deleteButtonFromLibraryListWidget {
      color: {{ colors.text.muted }};
      border-radius: 5px;
      border: none;
      padding: 2px;
      font-size: 12px;
      }
    #deleteButtonFromLibraryListWidget:hover {
      background-color: {{ colors.background.hover }};
    }
    #deleteButtonFromLibraryListWidget:pressed {
      background-color: {{ colors.background.pressed }};
    }

    QMessageBox {
      background-color: {{ colors.background.selected }};
      border: 1px solid {{ colors.border.light }};
    }

    QMessageBox QLabel {
      color: {{ colors.text.bright }};
      font-size: 16px;
    }

    QMessageBox QPushButton {
      background-color: {{ colors.button.primary }};
      color: white;
      border-radius: 5px;
      padding: 8px;
      min-width: 80px;
      font-size: 14px;
    }

    QMessageBox QPushButton:hover {
      background-color: {{ colors.button.primaryHover }};
    }

    QMessageBox QPushButton:pressed {
      background-color: {{ colors.button.primaryPressed }};
    }

  tooltip: |
    QToolTip {
      background-color: {{ colors.border.dark }};
      color: {{ colors.text.muted }};
      border-radius: 5px;
      padding: 5px;
      font-size: 14px;
    }
